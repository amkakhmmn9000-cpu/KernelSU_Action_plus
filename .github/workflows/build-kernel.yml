name: Build Kernel with KernelSU (Full-Optimized)
on:
  workflow_dispatch:
    inputs:
      KERNEL_SOURCE:
        description: "Kernel source URL"
        required: true
        default: "https://github.com/physwizz/A356e"
      BOOT_IMAGE_SOURCE:
        description: "Direct URL to stock boot.img"
        required: false
        default: ""

jobs:
  build:
    permissions:
      contents: write
    name: Build Kernel for ${{ github.actor }}
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Read configuration from config.env
      run: |
        if [ ! -f "config.env" ]; then echo "Error: config.env not found!"; exit 1; fi
        set -a
        source config.env
        set +a
        # تصدير المتغيرات للبيئة
        cat config.env >> $GITHUB_ENV

    - name: Setup compilation environment
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Shanghai date "+%Y%m%d-%H%M")" >> $GITHUB_ENV
        sudo apt update && sudo apt install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen bc libc6-dev-i386 lib32ncurses5-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3 python3-pip
        pip3 install gdown
        mkdir -p kernel_workspace

    - name: Set Swap space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Download Clang
      run: |
        cd kernel_workspace
        mkdir clang
        wget https://android.googlesource.com/platform/prebuilts/clang/host/${{ env.AOSP_CLANG_SYSTEM }}/+archive/4bb6424cb1615af408ae80871131f4da8c4ddadf/clang-${{ env.AOSP_CLANG_VERSION }}.tar.gz
        tar -C clang/ -zxvf clang-${{ env.AOSP_CLANG_VERSION }}.tar.gz

    - name: Download Kernel Source
      run: |
        cd kernel_workspace
        git clone --depth=1 ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel

    - name: Setup KernelSU
      if: env.ENABLE_KERNELSU == 'true'
      run: |
        cd kernel_workspace/android-kernel
        curl -LSs "${{ env.KERNELSU_INSTALLER }}" | bash -s ${{ env.KERNELSU_TAG }}
        echo "UPLOADNAME=-KernelSU" >> $GITHUB_ENV

    - name: Fix Kconfig Syntax & Apply Anti-Bootloop
      run: |
        cd kernel_workspace/android-kernel
        CONFIG_FILE="arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}"
        
        # 1. إصلاح أخطاء Kconfig التي ظهرت في الصورة (تداخل الـ menu)
        # نقوم بإضافة السورس الخاص بـ KernelSU في مكان آمن يدوياً
        sed -i '/menu "Device Drivers"/a source "drivers/kernelsu/Kconfig"' drivers/Kconfig
        
        # 2. حقن إعدادات تخطي حمايات سامسونج ومنع تعليق الشعار
        cat << 'EOF' >> $CONFIG_FILE
        # KernelSU Requirements
        CONFIG_KPROBES=y
        CONFIG_HAVE_KPROBES=y
        CONFIG_KPROBE_EVENTS=y
        CONFIG_OVERLAY_FS=y
        
        # Samsung Knox/Security Bypass
        CONFIG_TIMA=n
        CONFIG_UH=n
        CONFIG_UH_RKP=n
        CONFIG_RKP_KDP=n
        CONFIG_SECURITY_DEFEX=n
        CONFIG_SEC_RESTRICT_ROOTING=n
        CONFIG_SEC_RESTRICT_SETUID=n
        CONFIG_SEC_RESTRICT_FORK=n
        CONFIG_PROCA=n
        CONFIG_SECURITY_DSMS=n
        CONFIG_DM_VERITY=n
        CONFIG_KNOX_KAP=n
        
        # Kernel Optimization
        CONFIG_LOCALVERSION="-Khalifa-A35"
        CONFIG_CC_WERROR=n
        EOF

    - name: Build Kernel
      run: |
        cd kernel_workspace/android-kernel
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang/bin:$PATH
        export KBUILD_BUILD_HOST=${{ env.BUILDER_HOST }}
        export KBUILD_BUILD_USER=${{ github.actor }}
        
        # بدء عملية البناء
        make -j$(nproc --all) CC=clang O=out ARCH=${{ env.ARCH }} ${{ env.TC_CUSTOM_CMDS }} ${{ env.EXTRA_CMDS }} ${{ env.KERNEL_CONFIG }}
        make -j$(nproc --all) CC=clang O=out ARCH=${{ env.ARCH }} ${{ env.TC_CUSTOM_CMDS }} ${{ env.EXTRA_CMDS }}

    - name: Setup AnyKernel3
      run: |
        cd kernel_workspace
        git clone https://github.com/osm0sis/AnyKernel3.git
        cp android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} AnyKernel3/
        cd AnyKernel3
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
        zip -r9 ../../AnyKernel3-A35-KSU.zip *

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-A35-KSU-${{ env.BUILD_TIME }}
        path: AnyKernel3-A35-KSU.zip
