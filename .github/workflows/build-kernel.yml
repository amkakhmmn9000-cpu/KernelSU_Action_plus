Name: Build Kernel with KernelSU (Full-Optimized)
on:
  workflow_dispatch:
    inputs:
      KERNEL_SOURCE:
        description: "Kernel source URL"
        required: true
        default: "https://github.com/physwizz/A356e"
      BOOT_IMAGE_SOURCE:
        description: "Direct URL to stock boot.img"
        required: false
        default: ""

jobs:
  build:
    permissions:
      contents: write
    name: Build Kernel for ${{ github.actor }}
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Read configuration from config.env
      run: |
        CONFIG_ENV=config.env
        if [ ! -f "$CONFIG_ENV" ]; then
          echo "Error: config.env not found!"
          exit 1
        fi
        set -a
        source config.env
        set +a
        # تصدير كل المتغيرات لبيئة GitHub
        cat config.env >> $GITHUB_ENV

    - name: Setup kernel compilation environment
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Shanghai date "+%Y%m%d-%H%M")" >> $GITHUB_ENV
        echo "DEVICE=$(echo ${{ env.KERNEL_CONFIG }} | sed 's!vendor/!!;s/_defconfig//;s/_user//;s/-perf//')" >> $GITHUB_ENV
        sudo apt update
        sudo apt install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen bc libc6-dev-i386 lib32ncurses5-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3 python3-pip
        pip3 install gdown
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: Set Swap to 10GB
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Download AOSP Clang
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        mkdir clang
        # الرابط المباشر الصحيح لنسخة Clang r450784d لضمان عدم حدوث 404
        wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r450784d.tar.gz
        tar -C clang/ -zxvf clang-r450784d.tar.gz

    - name: Download kernel source code (Sparse Checkout)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --depth=1 --filter=blob:none --sparse ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel
        cd android-kernel
        git sparse-checkout set arch/arm64/configs arch/arm64/boot arch/arm64/kernel arch/arm64/include include Makefile Kconfig scripts kernel drivers fs mm init ipc lib security crypto block certs usr virt android gki sound net samples

    - name: Setup KernelSU
      if: env.ENABLE_KERNELSU == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        curl -LSs "${{ env.KERNELSU_INSTALLER }}" | bash -s ${{ env.KERNELSU_TAG }}
        echo "UPLOADNAME=-KernelSU" >> $GITHUB_ENV

    - name: Fix Kconfig Syntax & Apply Samsung Bypass
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        CONFIG_FILE="arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}"
        
        # إصلاح أخطاء المنيو (الصورة الأولى) عبر تنظيف الاستدعاء وإعادة وضعه بشكل صحيح
        sed -i '/kernelsu/d' drivers/Kconfig
        echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
        
        # حقن إعدادات تخطي الحماية لمنع البوت لوب
        cat << 'EOF' >> $CONFIG_FILE
        CONFIG_KPROBES=y
        CONFIG_HAVE_KPROBES=y
        CONFIG_KPROBE_EVENTS=y
        CONFIG_OVERLAY_FS=y
        CONFIG_TIMA=n
        CONFIG_UH=n
        CONFIG_UH_RKP=n
        CONFIG_RKP_KDP=n
        CONFIG_SECURITY_DEFEX=n
        CONFIG_SEC_RESTRICT_ROOTING=n
        CONFIG_PROCA=n
        CONFIG_SECURITY_DSMS=n
        CONFIG_DM_VERITY=n
        CONFIG_LOCALVERSION="-Khalifa-A35"
        CONFIG_CC_WERROR=n
        EOF

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang/bin:$PATH
        export KBUILD_BUILD_HOST=${{ env.BUILDER_HOST }}
        export KBUILD_BUILD_USER=${{ github.actor }}
        
        # البناء الرسمي
        make -j$(nproc --all) CC=clang O=out ARCH=${{ env.ARCH }} ${{ env.TC_CUSTOM_CMDS }} ${{ env.EXTRA_CMDS }} ${{ env.KERNEL_CONFIG }}
        make -j$(nproc --all) CC=clang O=out ARCH=${{ env.ARCH }} ${{ env.TC_CUSTOM_CMDS }} ${{ env.EXTRA_CMDS }}

    - name: Setup AnyKernel3
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://github.com/osm0sis/AnyKernel3.git
        cp android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} AnyKernel3/
        cd AnyKernel3
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
        zip -r9 AnyKernel3.zip *
        mv AnyKernel3.zip $GITHUB_WORKSPACE/

    - name: Upload AnyKernel3 package
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-${{ env.DEVICE }}-${{ env.BUILD_TIME }}
        path: AnyKernel3.zip
